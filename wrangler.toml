# Cloudflare Workers Static Assets deployment configuration.
# This project is served from avdp-dashboard.mohamedbangura.workers.dev,
# so Workers needs an explicit dist asset bucket for rebuilt Vite output.
name = "avdp-dashboard"
compatibility_date = "2026-06-05"
workers_dev = true

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
