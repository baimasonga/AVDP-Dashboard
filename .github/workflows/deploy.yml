name: Deploy to Cloudflare Pages

# Deploys the static build to Cloudflare Pages on every push to main (i.e. on
# merge of a PR). Requires these repository secrets:
#   - CLOUDFLARE_API_TOKEN   (token with "Cloudflare Pages: Edit" permission)
#   - CLOUDFLARE_ACCOUNT_ID  (your Cloudflare account id)
#   - VITE_SUPABASE_URL      (build-time; public, RLS-protected)
#   - VITE_SUPABASE_ANON_KEY (build-time; public, RLS-protected)
# The Pages project "avdp-dashboard" is created automatically on first deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build:web
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=avdp-dashboard --branch=main
